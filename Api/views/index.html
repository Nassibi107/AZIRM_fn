<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User QR Code</title>
    <link rel="stylesheet" href="public/style.css">
</head>
<body>

    <div class="card">
        <h2>User Info</h2>
        <p><strong>Email:</strong> <span id="email"></span></p>
        <p><strong>Phone:</strong> <span id="phone"></span></p>
        <!-- <img id="qrCode" src="" alt="QR Code"> -->
    </div>

    <script>
         async function fetchUserQr() {
    const userId = window.location.pathname.replace("/", "") || "1"; 
    try {
        const response = await fetch(`http://localhost:4000/${userId}`);
        const data = await response.json();

        console.log(data); // Log the response to check what is being returned

        if (data.error) {
            alert(data.error);
            return;
        }

        document.getElementById("email").textContent = data.user.email;
        document.getElementById("phone").textContent = data.user.phone;
        // document.getElementById("qrCode").src = data.qrCode;
    } catch (error) {
        console.error("Error fetching QR Code:", error);
    }
}


        fetchUserQr();
    </script>

</body>
</html>
