<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User vérifié QR Code</title>
    <link rel="stylesheet" href="public/style.css">
</head>
<body>
    <div class="card">
        <p class="verified">Membre vérifié <span class="check">✔</span></p>
        <div class="image">
            <img id="profileImage" src="" alt="Profile">
        </div>
        <h2 id="name" class="name"></h2>
        <p id="role" class="role"></p>
        <p id="iduser" class="id">#</p>
        <button class="don-btn">
            <a href="https://square.link/u/DfgtIac0" target="_blank" style="text-decoration: none; color: inherit;">Je Don</a>
          </button>
        <div class="social-icons">

            <a  href="https://azirm.ca" target="_blank" style="text-decoration: none; color: inherit;" >  <i class="fa-brands fa-facebook"> </i></i></a>
          <a  href="https://azirm.ca" target="_blank" style="text-decoration: none; color: inherit;" >  <i class="fa-brands fa-dribbble"></i></a>
          <a  href="https://azirm.ca" target="_blank" style="text-decoration: none; color: inherit;" > <i class="fa-brands fa-instagram"></i></a>
        </div>
    </div>

    <script>
        function getUserDataFromQuery() {
            const params = new URLSearchParams(window.location.search);
            const userData = params.get('userData');
            if (userData) {
                return JSON.parse(decodeURIComponent(userData));
            }
            return null;
        }

        function updateUserProfile(user) {
            if (user) {
                document.getElementById("name").textContent = user.name;
                document.getElementById("role").textContent = user.role;
                document.getElementById("iduser").textContent = user.team_member_id;
                document.getElementById("profileImage").src = user.profile_image;
            }
        }

        const user = getUserDataFromQuery();
        updateUserProfile(user);
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/js/all.min.js" crossorigin="anonymous"></script>
</body>
</html>
